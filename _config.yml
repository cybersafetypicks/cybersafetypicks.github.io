# ==============================================================
# THEME
# ==============================================================
theme                    : minimal-mistakes-jekyll
minimal_mistakes_skin    : "air"  # options: default, air, aqua, contrast, dark, dirt, neon, mint, sunrise

# ==============================================================
# SITE SETTINGS
# ==============================================================
title                    : "Cyber Safety Picks"
title_separator          : "|"
subtitle                 : "Simple Cybersecurity Guides"
description              : "Simple cybersecurity buying guides for families, students, freelancers, and home users."
url                      : "https://cybersafetypicks.github.io"  # ← replace with your actual GitHub Pages URL
baseurl                  : ""
locale                   : "en-US"
search                   : true
search_full_content      : true

# ==============================================================
# INCLUDE _pages FOLDER
# ==============================================================
include:
  - _pages

# ==============================================================
# PLUGINS
# ==============================================================
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-include-cache

# ==============================================================
# FOOTER LINKS
# ==============================================================
footer:
  links:
    - label: "Privacy Policy"
      url: "/privacy/"
    - label: "Affiliate Disclosure"
      url: "/affiliate-disclosure/"
    - label: "Editorial Policy"
      url: "/editorial-policy/"
    - label: "Contact"
      url: "/contact/"

# ==============================================================
# ANALYTICS — add your Google Analytics ID when ready
# ==============================================================
analytics:
  provider               : "google-gtag"
  google:
    tracking_id          : ""        # ← paste your G-XXXXXXXXXX here when ready
    anonymize_ip         : true

# ==============================================================
# PAGE DEFAULTS
# Auto-applies layouts based on folder — no need to add
# layout to every single .md file manually
# ==============================================================
defaults:
  # Static pages
  - scope:
      path: "_pages"
    values:
      layout: single
      author_profile: false

  # Start Here guides
  - scope:
      path: "guides"
    values:
      layout: single
      author_profile: false
      show_date: true

  # Buying guides
  - scope:
      path: "buying-guides"
    values:
      layout: single
      author_profile: false
      show_date: true
