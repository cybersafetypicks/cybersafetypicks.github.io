# ==============================================================
# THEME
# ==============================================================
theme                    : minimal-mistakes-jekyll
minimal_mistakes_skin    : "dark"  # options: default, air, aqua, contrast, dark, dirt, neon, mint, sunrise

# ==============================================================
# SITE SETTINGS
# ==============================================================
title                    : "Cyber Safety Picks"
title_separator          : "|"
subtitle                 : "Simple Cybersecurity Guides"
description              : "Simple cybersecurity buying guides for families, students, freelancers, and home users."
url                      : "https://cybersafetypicks.github.io"  # ← replace with your actual GitHub Pages URL
baseurl                  : ""
locale                   : "en-US"
search                   : true
search_full_content      : true

# ==============================================================
# PLUGINS
# ==============================================================
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-include-cache

# ==============================================================
# FOOTER LINKS
# ==============================================================
footer:
  links:
    - label: "Privacy Policy"
      url: "/privacy/"
    - label: "Affiliate Disclosure"
      url: "/affiliate-disclosure/"
    - label: "Editorial Policy"
      url: "/editorial-policy/"
    - label: "Contact"
      url: "/contact/"

# ==============================================================
# ANALYTICS — add your Google Analytics ID when ready
# ==============================================================
analytics:
  provider               : "google-gtag"
  google:
    tracking_id          : ""        # ← paste your G-XXXXXXXXXX here when ready
    anonymize_ip         : true

# ==============================================================
# PAGE DEFAULTS
# Applies layout: single to all pages automatically
# so you don't need to add it manually to every .md file
# ==============================================================
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
